services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=https://ollama.com
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - PORT=3001
    env_file:
      - backend/.env
    networks:
      - msc-network
    # ✅ Add healthcheck
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy  # ✅ Wait for backend to be healthy
    networks:
      - msc-network

networks:
  msc-network:
    driver: bridge