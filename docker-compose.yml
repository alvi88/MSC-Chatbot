services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=https://ollama.com
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - PORT=3001
    env_file:
      - backend/.env
    networks:
      - msc-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - msc-network
    # ✅ Add dependency verification
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  msc-network:
    driver: bridge