services:
  # ===== BACKEND SERVICE =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=https://ollama.com/api
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}  # Pass from environment
      - PORT=3001
      - DEFAULT_MODEL=gpt-oss:120b-cloud
    env_file:
      - backend/.env
    networks:
      - msc-network
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== FRONTEND SERVICE =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - msc-network

  # ===== OLLAMA SERVICE =====
  ollama:
    image: ollama/ollama:latest
    container_name: msc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - msc-network

# ===== NETWORKS =====
networks:
  msc-network:
    driver: bridge

# ===== VOLUMES =====
volumes:
  ollama_data:
    driver: local