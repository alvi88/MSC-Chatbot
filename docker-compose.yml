services:
  # ===== BACKEND SERVICE =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: msc-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - OLLAMA_HOST=https://ollama.com/api
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - PORT=3001
      - DEFAULT_MODEL=qwen3-coder:480b-cloud
    env_file:
      - backend/.env
    networks:
      - msc-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===== FRONTEND SERVICE =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: msc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - msc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===== NETWORKS =====
networks:
  msc-network:
    driver: bridge